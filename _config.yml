url: "https://MeshPoint.ca"     # set after DNS is live
#theme: jekyll-theme-minimal
#theme: jekyll-theme-midnight
theme: jekyll-theme-cayman

show_downloads: false
github:
  is_project_page: false

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
